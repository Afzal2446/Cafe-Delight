<div class="menu-page">
  <header class="menu-header">
    <h1><i class="fas fa-coffee"></i> Cafe Delight</h1>
    <p>Order fresh food & drinks</p>
    <a routerLink="/order/cart" class="cart-icon">
      <i class="fas fa-shopping-cart"></i>
      <span class="cart-badge" *ngIf="cartService.getItemCount() > 0">{{cartService.getItemCount()}}</span>
    </a>
  </header>

  <a class="active-order-banner" *ngIf="activeOrderId" [routerLink]="['/order/success', activeOrderId]">
    <i class="fas fa-receipt"></i>
    <span>View your order status</span>
    <i class="fas fa-chevron-right"></i>
  </a>

  <div class="categories">
    <button class="cat-btn" [class.active]="!selectedCategory" (click)="filterByCategory(null)">All</button>
    <button
      *ngFor="let cat of categories"
      class="cat-btn"
      [class.active]="selectedCategory === cat.id"
      (click)="filterByCategory(cat.id)">
      {{cat.name}}
    </button>
  </div>

  <div class="menu-grid">
    <div class="menu-card card" *ngFor="let item of filteredItems">
      <div class="menu-card-body">
        <h3>{{item.name}}</h3>
        <p class="desc">{{item.description}}</p>
        <div class="menu-card-footer">
          <span class="price">₹{{item.price}}</span>
          <button class="btn btn-primary btn-sm" (click)="addToCart(item)">
            <i class="fas fa-plus"></i> Add
          </button>
        </div>
      </div>
      <span class="category-tag">{{item.category_name}}</span>
    </div>
  </div>

  <div class="floating-cart" *ngIf="cartService.getItemCount() > 0">
    <a routerLink="/order/cart" class="btn btn-primary">
      <i class="fas fa-shopping-cart"></i>
      {{cartService.getItemCount()}} items — ₹{{cartService.getTotal()}} — View Cart
    </a>
  </div>

  <div class="toast toast-success" *ngIf="showToast">{{toastMessage}}</div>
</div>
