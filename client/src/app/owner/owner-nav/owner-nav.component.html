<nav class="owner-nav">
  <div class="nav-brand">
    <i class="fas fa-store"></i> Owner Panel
  </div>
  <div class="nav-links">
    <a routerLink="/owner" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <i class="fas fa-chart-bar"></i> <span>Dashboard</span>
    </a>
    <a routerLink="/owner/orders" routerLinkActive="active">
      <i class="fas fa-receipt"></i> <span>Orders</span>
      <span class="nav-badge" *ngIf="pendingCount > 0">{{pendingCount}}</span>
    </a>
    <a routerLink="/owner/menu" routerLinkActive="active">
      <i class="fas fa-utensils"></i> <span>Menu</span>
    </a>
    <a routerLink="/owner/qr" routerLinkActive="active">
      <i class="fas fa-qrcode"></i> <span>QR</span>
    </a>
    <a routerLink="/owner/feedback" routerLinkActive="active">
      <i class="fas fa-star"></i> <span>Feedback</span>
    </a>
    <a routerLink="/owner/settings" routerLinkActive="active">
      <i class="fas fa-cog"></i> <span>Settings</span>
    </a>
    <a class="logout-link" (click)="logout()">
      <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
    </a>
  </div>
</nav>

<div class="new-order-toast-stack" *ngIf="notifications.length > 0">
  <div class="notif-stack-header">
    <span>{{notifications.length}} notification{{notifications.length > 1 ? 's' : ''}}</span>
    <button class="clear-all-btn" (click)="dismissAll()">Clear all</button>
  </div>
  <div class="notif-card" *ngFor="let n of notifications"
       [class.notif-payment]="n.type === 'payment'"
       (click)="openOrder(n)">
    <i class="fas" [class.fa-bell]="n.type === 'order'" [class.fa-rupee-sign]="n.type === 'payment'"></i>
    <div class="notif-body">
      <span class="notif-title">{{n.title}}</span>
      <span class="notif-detail">{{n.detail}}</span>
    </div>
    <button class="notif-close" (click)="dismiss($event, n.key)" title="Dismiss">
      <i class="fas fa-times"></i>
    </button>
  </div>
</div>
