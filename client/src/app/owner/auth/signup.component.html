<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-brand">
      <i class="fas fa-store"></i>
      <h2>Create Owner Account</h2>
      <p>Register to manage your cafe</p>
    </div>

    <div class="form-group">
      <label>Name</label>
      <input type="text" [(ngModel)]="name" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="At least 6 characters" (keyup.enter)="submit()">
    </div>

    <p class="auth-error" *ngIf="error"><i class="fas fa-exclamation-circle"></i> {{error}}</p>

    <button class="btn btn-primary auth-btn" (click)="submit()" [disabled]="loading">
      {{loading ? 'Creating account...' : 'Sign Up'}}
    </button>

    <p class="auth-switch">
      Already have an account? <a routerLink="/owner/login">Sign in</a>
    </p>
  </div>
</div>
