<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-brand">
      <i class="fas fa-store"></i>
      <h2>Owner Login</h2>
      <p>Sign in to manage your cafe</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com" (keyup.enter)="submit()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Your password" (keyup.enter)="submit()">
    </div>

    <p class="auth-error" *ngIf="error"><i class="fas fa-exclamation-circle"></i> {{error}}</p>

    <button class="btn btn-primary auth-btn" (click)="submit()" [disabled]="loading">
      {{loading ? 'Signing in...' : 'Sign In'}}
    </button>

    <p class="auth-switch">
      Don't have an account? <a routerLink="/owner/signup">Create one</a>
    </p>
  </div>
</div>
