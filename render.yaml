services:
  - type: web
    name: cafe-qr-order
    runtime: node
    buildCommand: npm install && cd client && npm install && npx ng build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Set these in the Render dashboard (Environment tab) — do not commit secrets:
      # TURSO_DATABASE_URL  (e.g. libsql://your-db.turso.io)
      # TURSO_AUTH_TOKEN    (the token from `turso db tokens create`)
      # JWT_SECRET          (any long random string)
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
